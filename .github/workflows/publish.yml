name: Publish
run-name: Publish ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2025-vs2026
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6.0.3
      with:
        fetch-depth: 0

    - name: Validate Release Branch
      run: |
        $branchName = "${{ github.ref_name }}"
        
        function Fail-Workflow($reason) {
            echo "### :x: Publish Failed" >> $env:GITHUB_STEP_SUMMARY
            echo "**Reason:** $reason" >> $env:GITHUB_STEP_SUMMARY
            Write-Error $reason
            exit 1
        }
        
        # 1. Require workflow to run on a release/* branch
        if ($branchName -notmatch "^release/") {
            Fail-Workflow "Workflow must be run on a 'release/*' branch. Current branch: $branchName"
        }
        
        $baseVersionStr = $branchName.Substring("release/".Length)
        
        # 2. Check for leading zeros
        if ($baseVersionStr -match "\b0[0-9]+") {
            Fail-Workflow "Version cannot contain segments with leading zeros: $baseVersionStr"
        }
        
        try {
            $baseVersion = [System.Version]::Parse($baseVersionStr)
        } catch {
            Fail-Workflow "Invalid version format. Received: $baseVersionStr"
        }
        
        $tags = git tag | Where-Object { $_ -match "^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$" } | ForEach-Object { 
            try { [System.Version]$_ } catch { $null } 
        } | Where-Object { $_ -ne $null }
        
        # 3. Check if a tag from a newer release branch already exists
        $maxAllowed = [System.Version]::Parse("$($baseVersion.Major).$($baseVersion.Minor).$($baseVersion.Build).9999")
        $tagsGreaterBranch = $tags | Where-Object { $_ -gt $maxAllowed }
        if ($tagsGreaterBranch) {
            $conflictTag = ($tagsGreaterBranch | Sort-Object)[0]
            Fail-Workflow "A newer release branch tag already exists: $conflictTag"
        }
        
        # 4. Calculate next revision
        $matchingTags = $tags | Where-Object { $_.Major -eq $baseVersion.Major -and $_.Minor -eq $baseVersion.Minor -and $_.Build -eq $baseVersion.Build } | Sort-Object
        
        $nextRevision = 0
        if ($matchingTags) {
            $highestTag = $matchingTags[-1]
            $highestRevision = $highestTag.Revision
            if ($highestRevision -lt 0) { $highestRevision = 0 }
            $nextRevision = $highestRevision + 1
        }
        
        $finalVersionStr = "$($baseVersion.Major).$($baseVersion.Minor).$($baseVersion.Build).$nextRevision"
        echo "RELEASE_TAG=$finalVersionStr" >> $env:GITHUB_ENV
        echo "Calculated target version: $finalVersionStr"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.3.0
      with:
        dotnet-version: '10.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build and Publish
      run: |
        $version = "${{ env.RELEASE_TAG }}"
        dotnet publish SoundSwitcher/SoundSwitcher.csproj -c Release -r win-x64 --self-contained false -p:Version=$version -p:AppcastUrl="${{ vars.UPDATE_BASE_URL }}/appcast.xml" -o out/publish

    - name: Prepare Installer Files
      run: |
        $version = "${{ env.RELEASE_TAG }}"
        echo "APP_VERSION=$version" >> $env:GITHUB_ENV
        New-Item -ItemType Directory -Force -Path "SoundSwitcher\bin\Release\net10.0-windows\publish"
        Copy-Item -Path "out/publish\*" -Destination "SoundSwitcher\bin\Release\net10.0-windows\publish" -Recurse

    - name: Compile Inno Setup Installer
      run: |
        if (-Not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            choco install innosetup -y --no-progress
        }
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Installer/Setup.iss

    - name: Sign Update with WinSparkle EdDSA
      run: |
        $version = "${{ env.RELEASE_TAG }}"
        $privateKeyPath = "dsa_priv.pem"
        Set-Content -Path $privateKeyPath -Value "${{ secrets.WINSPARKLE_PRIVATE_KEY }}"
        
        $signature = & .\Libraries\WinSparkle\winsparkle-tool.exe sign -f $privateKeyPath "Installer/Output/SoundSwitcher-${version}-Setup.exe"
        echo "EDDSA_SIGNATURE=$signature" >> $env:GITHUB_ENV
        
        Remove-Item $privateKeyPath

    - name: Prepare Appcast and Release Notes
      shell: pwsh
      run: |
        mkdir public
        $version = "${{ env.RELEASE_TAG }}"
        $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/SoundSwitcher-${version}-Setup.exe"
        $signature = $env:EDDSA_SIGNATURE
        $pubDate = (Get-Date).ToString("R")
        $fileSize = (Get-Item "Installer/Output/SoundSwitcher-${version}-Setup.exe").Length
        
        # 1. Process multilingual release notes into a single HTML file with JS routing
        if (Test-Path "ReleaseNotes") {
            $langs = Get-ChildItem -Path "ReleaseNotes" -Filter "*.md" -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty BaseName | Sort-Object -Unique
        } else {
            $langs = @()
        }
        if (-not $langs) { $langs = @("en-US") }
        $combinedHtml = "<html><head><meta charset='utf-8'><style>body{font-family:'Segoe UI',sans-serif;font-size:12px;line-height:1.5;color:#333;} .lang-content{display:none;} h1{font-size:1.3em;border-bottom:1px solid #ddd;padding-bottom:5px;margin-top:0;} h2{font-size:1.15em;} h3{font-size:1em;} ul{padding-left:20px;margin-top:5px;} li{margin-bottom:5px;}</style>"
        $combinedHtml += "<script>window.onload = function() { var lang = (navigator.language || navigator.userLanguage || 'en').substring(0,2); var el = document.getElementById('content-' + lang); if (el) { el.style.display = 'block'; } else { var def = document.getElementById('content-en'); if(def) def.style.display = 'block'; else { var first = document.querySelector('.lang-content'); if(first) first.style.display = 'block'; } } };</script></head><body>"
        
        foreach ($lang in $langs) {
            $versionFile = "ReleaseNotes/${{ env.RELEASE_TAG }}/${lang}.md"
            
            $mdFileToRead = $null
            if (Test-Path $versionFile) {
                $mdFileToRead = $versionFile
            } else {
                if (Test-Path "ReleaseNotes") {
                    $fallbackFolders = Get-ChildItem -Path "ReleaseNotes" -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$" } | Sort-Object -Property @{Expression={[System.Version]$_.Name}; Descending=$true}
                    if ($null -ne $fallbackFolders) {
                        foreach ($folder in $fallbackFolders) {
                            $possibleFile = Join-Path $folder.FullName "${lang}.md"
                            if (Test-Path $possibleFile) {
                                $mdFileToRead = $possibleFile
                                break
                            }
                        }
                    }
                }
            }
            
            if ($mdFileToRead) {
                $mdHtml = (ConvertFrom-Markdown -Path $mdFileToRead).Html
            } else {
                $mdHtml = "<p>No release notes available.</p>"
            }
            
            $shortLang = $lang.Substring(0,2)
            # ZH uses zh-CN / zh-TW conventionally but for substring(0,2) it's just zh. 
            # We will append the full lang class just in case, but use ID for short lang.
            # To support exact match or short match:
            $combinedHtml += "<div id='content-$shortLang' class='lang-content' data-lang='$lang'>$mdHtml</div>"
        }
        $combinedHtml += "</body></html>"
        
        Set-Content -Path "public/release-notes.html" -Value $combinedHtml
        
        # 2. Generate Appcast XML
        $baseUrl = "${{ vars.UPDATE_BASE_URL }}".TrimEnd('/')
        $appcastUrl = "$baseUrl/appcast.xml"
        
        # Note: WinSparkle does not correctly parse multiple <sparkle:releaseNotesLink> tags.
        # It concatenates all URLs into a single string, resulting in a 404 error.
        # Therefore, we only provide a single release notes URL.
        $appcastXml = @"
        <?xml version="1.0" encoding="utf-8"?>
        <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
          <channel>
            <title>SoundSwitcher Appcast</title>
            <link>$appcastUrl</link>
            <description>Most recent changes with links to updates.</description>
            <item>
              <title>Version $version</title>
              <sparkle:releaseNotesLink>$baseUrl/release-notes.html</sparkle:releaseNotesLink>
              <pubDate>$pubDate</pubDate>
              <enclosure url="$downloadUrl"
                         sparkle:version="$version"
                         sparkle:edSignature="$signature"
                         length="$fileSize"
                         type="application/octet-stream" />
            </item>
          </channel>
        </rss>
        "@
        
        Set-Content -Path public/appcast.xml -Value $appcastXml

    - name: Setup Pages
      uses: actions/configure-pages@v6.0.0

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5.0.0
      with:
        path: './public'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5.0.0

    - name: Update Git Tag for Release
      run: |
        $tag = "${{ env.RELEASE_TAG }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -f $tag
        git push -f origin $tag

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v3.0.0
      with:
        name: SoundSwitcher ${{ env.APP_VERSION }}
        tag_name: ${{ env.RELEASE_TAG }}
        files: |
          Installer/Output/SoundSwitcher-*-Setup.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Regenerate Release Notes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ env.RELEASE_TAG }}"
        $notes = gh api --method POST -H "Accept: application/vnd.github+json" /repos/${{ github.repository }}/releases/generate-notes -f tag_name="$tag" -q .body
        if ($notes) {
            $notes | Out-File release_notes.md -Encoding utf8
            gh release edit $tag --notes-file release_notes.md
        }

    - name: Write Job Summary
      run: |
        $version = "${{ env.RELEASE_TAG }}"
        $baseUrl = "${{ vars.UPDATE_BASE_URL }}".TrimEnd('/')
        echo "### :rocket: Release $version Published!" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "#### :package: Package" >> $env:GITHUB_STEP_SUMMARY
        echo "- **Installer**: ``SoundSwitcher-${version}-Setup.exe``" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "#### :globe_with_meridians: GitHub Pages" >> $env:GITHUB_STEP_SUMMARY
        echo "- **Appcast XML**: $baseUrl/appcast.xml" >> $env:GITHUB_STEP_SUMMARY
        echo "- **Release Notes**: $baseUrl/release-notes.html" >> $env:GITHUB_STEP_SUMMARY
